<div class="app-menu-animate dropdown-panel pointer-events-auto"
         [class.toast-success]="type() === 'success'"
         [class.toast-error]="type() === 'error'">
    <div class="flex items-center gap-3 pl-4 pr-1.5 py-2.5 min-w-[260px] max-w-[420px]">

        <div class="flex-1 min-w-0">
            <p class="text-[15px] font-medium tracking-tight antialiased leading-snug truncate">
                {{ message() }}
            </p>
        </div>

        <button (click)="close.emit()" class="size-8 flex items-center justify-center rounded-full shrink-0
                                     bg-black/10 hover:bg-black/15 dark:bg-white/15 dark:hover:bg-white/25
                                     active:scale-90 transition-all">
            <svg class="size-4.5 stroke-black/80 dark:stroke-white" fill="none" viewBox="0 0 24 24">
                <path d="M6 18L18 6M6 6l12 12" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </button>
    </div>
</div>
