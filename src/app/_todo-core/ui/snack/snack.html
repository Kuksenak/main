<div class="apple-snack-pill pointer-events-auto"
         [class.toast-success]="type() === 'success'"
         [class.toast-error]="type() === 'error'">
    <div class="flex items-center gap-3 pl-4 pr-1.5 py-1.5 w-[calc(100vw-32px)] sm:w-auto sm:min-w-[300px] max-w-[420px]">

        <div class="flex-1 min-w-0">
            <p class="text-[14px] font-semibold tracking-tight antialiased leading-snug truncate">
                {{ message() }}
            </p>
        </div>

        <button (click)="close.emit()" class="size-8 flex items-center justify-center rounded-full shrink-0
                                     bg-black/5 hover:bg-black/10 dark:bg-white/10 dark:hover:bg-white/20
                                     active:scale-90 transition-all">
            <svg class="size-[18px] opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </button>
    </div>
</div>
