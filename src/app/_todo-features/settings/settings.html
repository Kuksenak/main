<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4">
    <div class="flex flex-col leading-snug">
        <span class="text-[16px] font-semibold tracking-tight">Theme Mode</span>
        <span class="text-[13px] opacity-40">Switch between light and dark aesthetics</span>
    </div>

    <div class="flex bg-app-text/[0.04] p-1 rounded-[14px] border border-app-border/5 w-full md:w-72 h-12 shrink-0">
        @for (t of themes; track t) {
        <button (click)="changeTheme(t)"
            class="relative flex-1 h-full text-[14px] font-medium transition-all duration-300 outline-none"
            [class.text-app-accent]="currentTheme() === t" [class.opacity-50]="currentTheme() !== t">
            <span class="relative z-10">{{ t | titlecase }}</span>
            @if (currentTheme() === t) {
            <div
                class="absolute inset-0 bg-app-surface shadow-sm rounded-[10px] animate-in fade-in zoom-in-95 duration-200">
            </div>
            }
        </button>
        }
    </div>
</div>

<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4">
    <div class="flex flex-col leading-snug">
        <span class="text-[16px] font-semibold tracking-tight">Accent Color</span>
        <span class="text-[13px] opacity-40">Personalize your interaction highlights</span>
    </div>

    <div class="flex items-center justify-between w-72 px-2 shrink-0">
        @for (color of accentColors; track color) {
        <button (click)="setAccent(color)"
            class="relative size-7 rounded-full transition-all hover:scale-110 active:scale-90 flex items-center justify-center shadow-md shadow-black/5"
            [style.backgroundColor]="color">
            @if (currentAccent() === color) {
            <svg class="size-3.5 text-white animate-in zoom-in duration-300" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            }
        </button>
        }
    </div>

</div>
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4">
    @for(msg of messages; track msg) {
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4">
        <span class="text-[13px] opacity-40">{{msg}}</span>
    </div>
    }
</div>
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4">
    <span class="text-[13px] opacity-40">Build: {{version}}</span>
</div>

<!-- Skeleton content to test scroll -->
<div class="p-4 flex flex-col gap-8 opacity-[0.07] dark:opacity-[0.15] mb-12">
    @for (i of [1,2,3,4,5,6]; track $index) {
    <div class="flex flex-col gap-3">
        <div class="w-24 h-4 bg-current rounded-full"></div>
        <div class="w-full h-3 bg-current rounded-full"></div>
        <div class="w-2/3 h-3 bg-current rounded-full"></div>
    </div>
    }
</div>
