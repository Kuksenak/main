<h2 mat-dialog-title>Setup MFA</h2>
<mat-dialog-content>
    <div class="form-container">
        <mat-form-field appearance="outline">
            <mat-label>Issuer</mat-label>
            <input matInput [value]="issuer()" (input)="issuer.set($any($event.target).value)">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Secret</mat-label>
            <input matInput [value]="secret()" (input)="secret.set($any($event.target).value)">
            <!-- type="password"> -->
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input matInput [value]="username()" (input)="username.set($any($event.target).value)">
        </mat-form-field>
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <button mat-button mat-dialog-close (click)="close()">Cancel</button>
    <button matButton="tonal" (click)="create()" [disabled]="!isValid()">Create</button>
</mat-dialog-actions>
