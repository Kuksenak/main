<nav class="flex items-center justify-between px-4 py-3 border-b border-black/8 dark:border-white/8">
  <div class="flex items-center gap-1">
    @if (auth.isAuthenticated()) {
      <button (click)="openElements()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium hover:bg-black/5 dark:hover:bg-white/8 transition-[transform,background-color] active:scale-[0.96]">Elements</button>
      <button (click)="openEvents()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium hover:bg-black/5 dark:hover:bg-white/8 transition-[transform,background-color] active:scale-[0.96]">Events</button>
      <button (click)="openSettings()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium hover:bg-black/5 dark:hover:bg-white/8 transition-[transform,background-color] active:scale-[0.96]">Settings</button>
    }
  </div>

  <div class="flex items-center gap-3">
    @if (appUpdate.updateAvailable()) {
      <button appButton (click)="appUpdate.reloadApp()">Update available</button>
    }
    @if (auth.isAuthenticated()) {
      <span class="text-[13px] opacity-40">{{ userEmail() }}</span>
      <button appButton variant="warn" (click)="auth.signout()">Sign Out</button>
    } @else {
      <button appButton (click)="auth.signin()">Sign In</button>
    }
  </div>
</nav>
