<nav class="flex items-center justify-between navbar-safe-area">
    <div>
        <strong>My App</strong>
    </div>

    <div class="flex items-center gap-2">
        <button (click)="openSettings()" class="p-2 opacity-40 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition-all" title="Settings">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>

        @if(auth.isAuthenticated()) {
            <button type="button" [cdkMenuTriggerFor]="profileMenu" #profileTrigger class="flex items-center gap-1 hover:underline underline-offset-4 text-[14px] font-medium">
                {{userEmail()}}
                <svg class="w-3.5 h-3.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
        }
        @else {
            <button type="button" [cdkMenuTriggerFor]="authMenu" class="flex items-center gap-1 hover:underline underline-offset-4 text-[14px] font-medium">
                Sign In
                <svg class="w-3.5 h-3.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
        }
    </div>
</nav>

<ng-template #profileMenu>
    <div cdkMenu class="bg-[var(--bg-main)] shadow-xl border border-[var(--border-menu)] min-w-[200px] mt-1 p-2 flex flex-col gap-1">
        <div class="px-2 py-2 mb-2 opacity-70">
            <div class="truncate">{{userEmail()}}</div>
        </div>

        <button cdkMenuItem (click)="openSettings()" class="text-left px-2 py-1 hover:bg-[var(--hover-menu)]">
            Settings
        </button>

        <button cdkMenuItem (click)="reload()" class="text-left px-2 py-1 hover:bg-[var(--hover-menu)]">
            Reload App
        </button>

        <button cdkMenuItem (click)="auth.signout()" class="text-left px-2 py-1 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20">
            Sign Out
        </button>
    </div>
</ng-template>

<ng-template #authMenu>
    <div cdkMenu class="bg-[var(--bg-main)] shadow-xl border border-[var(--border-menu)] min-w-[160px] mt-1 p-2">
        <button cdkMenuItem (click)="auth.signin()" class="w-full text-left px-2 py-1 hover:bg-[var(--hover-menu)]">
            Sign In / Register
        </button>
    </div>
</ng-template>
