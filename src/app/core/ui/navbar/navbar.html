<nav class="flex items-center justify-between px-4 py-3 border-b border-black/8 dark:border-white/8">
  <div class="flex items-center gap-1">
    @if (auth.isAuthenticated()) {
      <button (click)="openElements()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium hover:bg-black/5 dark:hover:bg-white/8 transition-colors">Elements</button>
      <button (click)="openEvents()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium hover:bg-black/5 dark:hover:bg-white/8 transition-colors">Events</button>
      <button (click)="openSettings()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium hover:bg-black/5 dark:hover:bg-white/8 transition-colors">Settings</button>
    }
  </div>

  <div class="flex items-center gap-3">
    @if (auth.isAuthenticated()) {
      <span class="text-[13px] opacity-40">{{ userEmail() }}</span>
      <button (click)="auth.signout()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium text-[#fa233b] hover:bg-red-500/10 transition-colors">Sign Out</button>
    } @else {
      <button (click)="auth.signin()" class="px-3 py-1.5 rounded-lg text-[15px] font-medium hover:bg-black/5 dark:hover:bg-white/8 transition-colors">Sign In</button>
    }
  </div>
</nav>
