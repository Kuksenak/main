<div class="flex flex-col gap-1.5 w-full">
  @if (label) {
    <span class="text-sm opacity-70">{{ label }}</span>
  }

  @if (isMobile()) {
    <!-- Mobile: native time picker -->
    <input
      type="time"
      [value]="value() ?? ''"
      [disabled]="disabled"
      (change)="onNativeChange($event)"
      class="w-full px-3 py-2 rounded-lg border border-black/10 dark:border-white/10 bg-transparent text-[17px] focus:outline-none [-webkit-tap-highlight-color:transparent] disabled:opacity-40"
    >
  } @else {
    <!-- Desktop: custom iOS-style time picker via CDK overlay -->
    <button
      #trigger
      type="button"
      cdkOverlayOrigin
      #origin="cdkOverlayOrigin"
      [disabled]="disabled"
      (click)="toggle(trigger)"
      class="w-full flex items-center justify-between gap-2 px-3 py-2 rounded-lg border border-black/10 dark:border-white/10 bg-transparent text-[17px] text-left focus:outline-none [-webkit-tap-highlight-color:transparent] disabled:opacity-40 hover:bg-black/3 dark:hover:bg-white/5 transition-colors"
    >
      <span [class.opacity-40]="!value()">{{ triggerLabel() }}</span>
      <svg class="w-4 h-4 opacity-40 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z" />
      </svg>
    </button>

    <ng-template
      cdkConnectedOverlay
      [cdkConnectedOverlayOrigin]="origin"
      [cdkConnectedOverlayOpen]="isOpen()"
      [cdkConnectedOverlayHasBackdrop]="true"
      cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
      (attach)="onOpened()"
      (backdropClick)="close()"
      (detach)="close()"
    >
      <div class="mt-1.5 p-2 w-[180px] rounded-2xl bg-white dark:bg-[#242426] overflow-hidden
                  origin-top [animation:dropdownIn_160ms_cubic-bezier(0.2,0,0,1)]
                  shadow-[0_0_0_1px_rgba(0,0,0,0.06),0_8px_30px_rgba(0,0,0,0.12)]
                  dark:shadow-[0_0_0_1px_rgba(255,255,255,0.08),0_8px_30px_rgba(0,0,0,0.4)]">

        <div class="flex gap-1">
          <!-- Hours -->
          <div #hourCol class="relative flex-1 flex flex-col gap-0.5 max-h-60 overflow-y-auto">
            @for (h of hours; track h) {
              <button
                type="button"
                (click)="selectHour(h)"
                [attr.data-active]="activeHour() === h ? '' : null"
                class="w-full py-1.5 rounded-lg text-[15px] text-center transition-colors [-webkit-tap-highlight-color:transparent]"
                [class]="hourClass(h)"
              >{{ h.toString().padStart(2, '0') }}</button>
            }
          </div>

          <div class="w-px bg-black/10 dark:bg-white/10 my-1"></div>

          <!-- Minutes -->
          <div #minuteCol class="relative flex-1 flex flex-col gap-0.5 max-h-60 overflow-y-auto">
            @for (m of minutes(); track m) {
              <button
                type="button"
                (click)="selectMinute(m)"
                [attr.data-active]="activeMinute() === m ? '' : null"
                class="w-full py-1.5 rounded-lg text-[15px] text-center transition-colors [-webkit-tap-highlight-color:transparent]"
                [class]="minuteClass(m)"
              >{{ m.toString().padStart(2, '0') }}</button>
            }
          </div>
        </div>
      </div>
    </ng-template>
  }
</div>
