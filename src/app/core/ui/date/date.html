<div class="flex flex-col gap-1.5 w-full">
  @if (label) {
    <span class="text-sm opacity-70">{{ label }}</span>
  }

  @if (isMobile()) {
    <!-- Mobile: native date picker -->
    <input
      type="date"
      [value]="nativeValue()"
      [disabled]="disabled"
      (change)="onNativeChange($event)"
      class="w-full px-3 py-2 rounded-lg border border-black/10 dark:border-white/10 bg-transparent text-[15px] focus:outline-none [-webkit-tap-highlight-color:transparent] disabled:opacity-40"
    >
  } @else {
    <!-- Desktop: custom iOS-style calendar via CDK overlay -->
    <button
      #trigger
      type="button"
      cdkOverlayOrigin
      #origin="cdkOverlayOrigin"
      [disabled]="disabled"
      (click)="toggle(trigger)"
      class="w-full flex items-center justify-between gap-2 px-3 py-2 rounded-lg border border-black/10 dark:border-white/10 bg-transparent text-[15px] text-left focus:outline-none [-webkit-tap-highlight-color:transparent] disabled:opacity-40 hover:bg-black/3 dark:hover:bg-white/5 transition-colors"
    >
      <span [class.opacity-40]="!value()">{{ triggerLabel() }}</span>
      <svg class="w-4 h-4 opacity-40 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M3 11h18M5 5h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z" />
      </svg>
    </button>

    <ng-template
      cdkConnectedOverlay
      [cdkConnectedOverlayOrigin]="origin"
      [cdkConnectedOverlayOpen]="isOpen()"
      [cdkConnectedOverlayHasBackdrop]="true"
      cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
      (backdropClick)="close()"
      (detach)="close()"
    >
      <div class="mt-1.5 p-3 w-[300px] rounded-2xl bg-[var(--surface)] overflow-hidden
                  origin-top [animation:dropdownIn_160ms_cubic-bezier(0.2,0,0,1)]
                  shadow-[0_0_0_1px_rgba(0,0,0,0.08),0_8px_30px_rgba(0,0,0,0.12)]
                  dark:shadow-[0_0_0_1px_rgba(255,255,255,0.06),0_8px_30px_rgba(0,0,0,0.5)]">

        <!-- Header: month nav -->
        <div class="flex items-center justify-between mb-2">
          <button type="button" (click)="prevMonth()" aria-label="Previous month"
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-[transform,background-color] active:scale-[0.96] [-webkit-tap-highlight-color:transparent]">
            <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <span class="text-[15px] font-semibold text-balance">{{ monthLabel() }}</span>
          <button type="button" (click)="nextMonth()" aria-label="Next month"
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-[transform,background-color] active:scale-[0.96] [-webkit-tap-highlight-color:transparent]">
            <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- Weekday labels -->
        <div class="grid grid-cols-7 mb-1">
          @for (wd of weekdays; track wd) {
            <div class="h-8 flex items-center justify-center text-xs font-medium opacity-40">{{ wd }}</div>
          }
        </div>

        <!-- Days -->
        @for (week of weeks(); track $index) {
          <div class="grid grid-cols-7">
            @for (cell of week; track cell.date.getTime()) {
              <div class="flex items-center justify-center py-0.5">
                <button
                  type="button"
                  (click)="selectDay(cell)"
                  class="w-10 h-10 rounded-full text-[15px] tabular-nums flex items-center justify-center transition-[transform,background-color] active:scale-[0.96] [-webkit-tap-highlight-color:transparent]"
                  [class.opacity-30]="!cell.inMonth"
                  [class]="isSelected(cell.date)
                    ? 'bg-[#d4732f] text-white font-semibold'
                    : isToday(cell.date)
                      ? 'text-[#d4732f] font-semibold hover:bg-black/5 dark:hover:bg-white/10'
                      : 'hover:bg-black/5 dark:hover:bg-white/10'"
                >
                  {{ cell.date.getDate() }}
                </button>
              </div>
            }
          </div>
        }
      </div>
    </ng-template>
  }
</div>
