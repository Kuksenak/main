<!-- Apple Music Floating Player Bar -->
<div class="apple-player-bar">
    <!-- Left Controls -->
    <div class="flex items-center gap-1">
        <button class="player-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        </button>
        <button class="player-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 19l-9-7 9-7v14z"/><path d="M22 19l-9-7 9-7v14z"/></svg>
        </button>
        <button class="player-btn play">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="player-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13 5l9 7-9 7V5z"/><path d="M2 5l9 7-9 7V5z"/></svg>
        </button>
        <button class="player-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
        </button>
    </div>

    <!-- Center Logo (Apple Music uses its logo here) -->
    <div class="flex items-center justify-center opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 18.57c-.82 1.2-1.68 2.4-3.05 2.4-1.33 0-1.78-.8-3.3-.8-1.52 0-2 .78-3.28.8-1.42.02-2.38-1.28-3.23-2.5C2.46 15.82 1.34 11.8 2.2 8.9c.42-1.4 1.7-2.3 3.14-2.32 1.34-.02 2.6.9 3.42.9.83 0 2.34-1.12 3.92-1 1.63.14 3.08.8 4 2.15-3.37 1.95-2.77 6.64.67 8.04-.6 1.5-1.46 3-2.3 4.2zm-4.32-15.6c.74-.93 1.22-2.18 1.08-3.47-1.14.05-2.45.76-3.2 1.68-.68.82-1.24 2.1-1.08 3.37 1.28.1 2.46-.66 3.2-1.58z"/>
        </svg>
    </div>

    <!-- Right Controls -->
    <div class="flex items-center gap-1">
        <button class="player-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></svg>

        <button class="player-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="player-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07l1.41 1.41a7 7 0 0 0 0-9.9l-1.41 1.42zM19.07 4.93a10 10 0 0 1 0 14.14l1.41 1.41a12 12 0 0 0 0-16.97l-1.41 1.42z"/></svg>
        </button>

</div>
