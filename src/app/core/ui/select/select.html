<div class="flex flex-col gap-1.5 w-full">
  @if (label) {
    <span class="text-sm opacity-70">{{ label }}</span>
  }

  @if (isMobile()) {
    <!-- Mobile: native select (default OS picker) -->
    <select
      [disabled]="disabled"
      (change)="onNativeChange($event)"
      class="w-full px-3 py-2 rounded-lg border border-black/10 dark:border-white/10 bg-transparent text-[17px] appearance-auto focus:outline-none [-webkit-tap-highlight-color:transparent] disabled:opacity-40"
    >
      @if (selectedIndex < 0) {
        <option value="-1" disabled selected hidden>{{ placeholder }}</option>
      }
      @for (opt of options; track opt.value; let i = $index) {
        <option [value]="i" [selected]="i === selectedIndex">{{ opt.label }}</option>
      }
    </select>
  } @else {
    <!-- Desktop: custom iOS-style dropdown via CDK overlay -->
    <button
      #trigger
      type="button"
      cdkOverlayOrigin
      #origin="cdkOverlayOrigin"
      [disabled]="disabled"
      (click)="toggle(trigger)"
      class="w-full flex items-center justify-between gap-2 px-3 py-2 rounded-lg border border-black/10 dark:border-white/10 bg-transparent text-[17px] text-left focus:outline-none [-webkit-tap-highlight-color:transparent] disabled:opacity-40 hover:bg-black/3 dark:hover:bg-white/5 transition-colors"
    >
      <span [class.opacity-40]="selectedIndex < 0">{{ selectedOption?.label ?? placeholder }}</span>
      <svg
        class="w-4 h-4 opacity-40 shrink-0 transition-transform duration-200"
        [class.rotate-180]="isOpen"
        fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    <ng-template
      cdkConnectedOverlay
      [cdkConnectedOverlayOrigin]="origin"
      [cdkConnectedOverlayOpen]="isOpen"
      [cdkConnectedOverlayWidth]="panelWidth"
      [cdkConnectedOverlayHasBackdrop]="true"
      cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
      (backdropClick)="close()"
      (detach)="close()"
    >
      <div class="w-full mt-1.5 py-1 rounded-xl border border-black/10 dark:border-white/10 bg-white dark:bg-[#242426] shadow-[0_8px_30px_rgba(0,0,0,0.12)] overflow-hidden max-h-72 overflow-y-auto">
        @for (opt of options; track opt.value) {
          <button
            type="button"
            (click)="select(opt)"
            class="w-full flex items-center justify-between gap-2 px-3 py-2 text-left text-[17px] hover:bg-black/5 dark:hover:bg-white/8 transition-colors"
          >
            <span>{{ opt.label }}</span>
            @if (opt.value === value) {
              <svg class="w-4 h-4 shrink-0 text-[#0071eb]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            }
          </button>
        }
      </div>
    </ng-template>
  }
</div>
