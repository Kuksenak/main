<label
  class="flex items-center min-h-10 cursor-pointer select-none gap-3 has-[:disabled]:cursor-not-allowed"
  [class.w-full]="isMobile()"
  [class.justify-between]="isMobile()"
  [class.flex-row-reverse]="!isMobile()"
>
  @if (label) {
    <span class="text-[15px] leading-[1.4] text-pretty">{{ label }}</span>
  }

  @if (isMobile()) {
    <!-- Mobile: native toggle (default OS rendering; iOS uses `switch` attr) -->
    <input
      type="checkbox"
      switch
      [checked]="checked"
      [disabled]="disabled"
      (change)="onToggle($event)"
      class="shrink-0 accent-[#d4732f] disabled:opacity-50 disabled:cursor-not-allowed"
    >
  } @else {
    <!-- Desktop: custom iOS-style slider -->
    <input
      type="checkbox"
      [checked]="checked"
      [disabled]="disabled"
      (change)="onToggle($event)"
      class="shrink-0 appearance-none cursor-pointer outline-none
             w-11 h-6 rounded-full relative
             bg-[#d1d1d6] dark:bg-white/20
             transition-colors duration-300
             checked:bg-[#d4732f]
             disabled:opacity-50 disabled:cursor-not-allowed
             after:content-[''] after:absolute after:top-0.5 after:left-0.5
             after:w-5 after:h-5 after:bg-white after:rounded-full
             after:shadow-[0_2px_4px_rgba(0,0,0,0.2)]
             after:transition-transform after:duration-[250ms]
             after:ease-[cubic-bezier(0.4,0,0.2,1)]
             checked:after:translate-x-5"
    >
  }
</label>
