<div
  class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 pt-3 pb-4 pointer-events-auto
         bg-[linear-gradient(to_bottom,#fff_60%,transparent)] dark:bg-[linear-gradient(to_bottom,#242426_60%,transparent)]">

  <!-- Draggable Title -->
  <div
    (pointerdown)="onPointerDown($event)"
    class="absolute top-2 left-1/2 -translate-x-1/2 px-3 py-1.5 rounded-full cursor-grab active:cursor-grabbing touch-none select-none"
  >
    <div class="text-[22px] font-semibold tracking-wide opacity-70 whitespace-nowrap">
      {{ (sheetRef.title$ | async) || 'Sheet' }}
    </div>
    </div>

    <!-- Left Button (Close) -->
    <button appIconButton (click)="$event.stopPropagation(); close()" class="z-10 pointer-events-auto">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>

    @if (sheetRef.headerPortal$ | async; as headerPortal) {
      @if (headerPortal) {
        <div class="z-10 pointer-events-auto" (pointerdown)="$event.stopPropagation()">
          <ng-template [cdkPortalOutlet]="headerPortal"></ng-template>
        </div>
      } @else {
        <div class="w-11 h-11"></div>
      }
    } @else {
      <div class="w-11 h-11"></div>
    }
</div>

<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto overflow-x-hidden relative pt-14 pb-24">
    <div class="pl-0 pr-0">
        <ng-template [cdkPortalOutlet]="getContentPortal()"></ng-template>
    </div>
</div>

@if (sheetRef.buttonsPortal$ | async; as buttonsPortal) {
  @if (buttonsPortal) {
    <div class="absolute bottom-0 left-0 right-0 z-20 p-4 bg-[linear-gradient(to_top,#fff_60%,transparent)] dark:bg-[linear-gradient(to_top,#242426_60%,transparent)] backdrop-blur-xl pointer-events-auto">
      <ng-template [cdkPortalOutlet]="buttonsPortal"></ng-template>
    </div>
  }
}
