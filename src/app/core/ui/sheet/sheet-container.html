<div (pointerdown)="onPointerDown($event)"
    class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 pt-3 pb-4 pointer-events-auto touch-none"
    style="background: linear-gradient(to bottom, var(--color-app-surface) 60%, transparent 100%);">

    <!-- Handle -->
    <div class="absolute top-2.5 left-1/2 -translate-x-1/2 py-1.5">
        <div class="w-9 h-[5px] bg-black/15 dark:bg-white/20 rounded-full"></div>
    </div>

    <!-- Left Button (Close) -->
    <button (click)="$event.stopPropagation(); close()"
        class="w-10 h-10 flex items-center justify-center rounded-full bg-black/[0.06] dark:bg-white/[0.08] hover:bg-black/[0.1] dark:hover:bg-white/[0.14] transition-all duration-200 z-10 pointer-events-auto">
        <svg class="w-[18px] h-[18px] opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>

    <!-- Right Button (Confirm) -->
    <button (click)="$event.stopPropagation(); close()"
        class="w-10 h-10 flex items-center justify-center rounded-full bg-black/[0.06] dark:bg-white/[0.08] hover:bg-black/[0.1] dark:hover:bg-white/[0.14] transition-all duration-200 z-10 pointer-events-auto">
        <svg class="w-[20px] h-[20px]" fill="none" [style.stroke]="accentColor()" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
        </svg>
    </button>
</div>

<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto overflow-x-hidden relative pt-14">
    <div class="pl-0 pr-0">
        <ng-template [cdkPortalOutlet]="portal"></ng-template>
    </div>
</div>
