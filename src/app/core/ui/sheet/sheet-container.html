<div (pointerdown)="onPointerDown($event)"
    class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 pt-4 pb-4 pointer-events-auto touch-none backdrop-blur-3xl bg-gradient-to-b from-white/80 dark:from-[#33373a]/80 to-transparent cursor-grab active:cursor-grabbing"
    [style.mask-image]="'linear-gradient(to bottom, black 80%, transparent 100%)'"
    [style.webkit-mask-image]="'linear-gradient(to bottom, black 80%, transparent 100%)'">

    <!-- Handle -->
    <div class="absolute top-2 left-1/2 -translate-x-1/2 py-2">
        <div class="w-9 h-1.5 bg-black/20 dark:bg-white/20 rounded-full"></div>
    </div>

    <!-- Left Button (Close) -->
    <button (click)="$event.stopPropagation(); close()"
        class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white/10 dark:bg-white/5 backdrop-blur-xl border border-white/20 dark:border-white/10 hover:bg-white/20 dark:hover:bg-white/15 transition-all z-10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),0_2px_10px_rgba(0,0,0,0.1)] pointer-events-auto">
        <svg class="w-[26px] h-[26px] opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>

    <!-- Right Button (Confirm) -->
    <button (click)="$event.stopPropagation(); close()"
        class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white/10 dark:bg-white/5 backdrop-blur-xl border border-white/20 dark:border-white/10 hover:bg-white/20 dark:hover:bg-white/15 transition-all z-10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),0_2px_10px_rgba(0,0,0,0.1)] pointer-events-auto">
        <svg class="w-[26px] h-[26px]" fill="none" [style.stroke]="accentColor()" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
        </svg>
    </button>
</div>

<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto overflow-x-hidden relative pt-14">
    <div class="pl-0 pr-0">
        <ng-template [cdkPortalOutlet]="portal"></ng-template>
    </div>
</div>
