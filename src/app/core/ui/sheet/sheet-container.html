<div
  class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 pt-3 pb-4 pointer-events-auto"
    style="background: linear-gradient(to bottom, var(--color-app-surface) 60%, transparent 100%);">

  <!-- Draggable Title -->
  <div
    (pointerdown)="onPointerDown($event)"
    class="absolute top-2 left-1/2 -translate-x-1/2 px-3 py-1.5 rounded-full cursor-grab active:cursor-grabbing touch-none select-none"
  >
    <div class="text-[22px] font-semibold tracking-wide opacity-70 whitespace-nowrap">
      {{ (sheetRef.title$ | async) || 'Sheet' }}
    </div>
    </div>

    <!-- Left Button (Close) -->
    <button (click)="$event.stopPropagation(); close()"
      class="w-11 h-11 flex items-center justify-center rounded-full bg-white/45 dark:bg-white/[0.12] backdrop-blur-lg border border-white/65 dark:border-white/25 shadow-[0_6px_24px_rgba(0,0,0,0.08),inset_0_0.5px_0_rgba(255,255,255,0.3)] hover:bg-white/50 dark:hover:bg-white/[0.14] active:scale-110 active:bg-white/60 dark:active:bg-white/[0.18] active:shadow-[0_10px_28px_rgba(0,0,0,0.1),inset_0_1px_0_rgba(255,255,255,0.5)] transition-all duration-150 ease-out z-10 pointer-events-auto">
        <svg class="w-[24px] h-[24px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>

    @if (sheetRef.headerPortal$ | async; as headerPortal) {
      @if (headerPortal) {
        <div class="z-10 pointer-events-auto" (pointerdown)="$event.stopPropagation()">
          <ng-template [cdkPortalOutlet]="headerPortal"></ng-template>
        </div>
      } @else {
        <div class="w-11 h-11"></div>
      }
    } @else {
      <div class="w-11 h-11"></div>
    }
</div>

<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto overflow-x-hidden relative pt-14 pb-24">
    <div class="pl-0 pr-0">
        <ng-template [cdkPortalOutlet]="getContentPortal()"></ng-template>
    </div>
</div>

@if (sheetRef.buttonsPortal$ | async; as buttonsPortal) {
  @if (buttonsPortal) {
    <div class="absolute bottom-0 left-0 right-0 z-20 p-4 bg-[linear-gradient(to_top,var(--color-app-surface)_60%,transparent_100%)] backdrop-blur-xl pointer-events-auto">
      <ng-template [cdkPortalOutlet]="buttonsPortal"></ng-template>
    </div>
  }
}
