<button matButton="tonal" (click)="openDialog()">
    <mat-icon>add</mat-icon>
    Create
</button>
<!-- <button matButton="tonal" (click)="scanScreen()">QR</button> -->

<button matIconButton matTooltip="Scan QR code" (click)="scanScreen()">
    <mat-icon>qr_code_scanner</mat-icon>
</button>
<div class="scanner-container">

@if(loading){
    loading
}
<canvas #canvas hidden></canvas>

    <!-- <div @if = "scanning" class="status">
        Статус: Ищу QR-код... Выберите окно с кодом.
    </div> -->
</div>


<div class="scanner-shell">
  <zxing-scanner 
    [enable]="scannerEnabled"
    (scanSuccess)="onScanSuccess($event)"
    [formats]=allowedFormats>
  </zxing-scanner>

  <div class="overlay">
    <div class="target-box"></div>
    <p>Наведите камеру на QR-код</p>
  </div>
</div>

<button (click)="toggleScanner()">
  {{ scannerEnabled ? 'Выключить' : 'Включить камеру' }}
</button>
