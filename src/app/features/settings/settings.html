<div class="flex flex-col gap-6 px-1 pt-6 pb-8" style="margin: 50px">

    <!-- Notifications -->
    @if (messages.length > 0) {
    <div class="flex flex-col gap-2 p-4">
        <span class="text-[17px] font-bold tracking-tight">Notifications</span>
        @for(msg of messages; track msg) {
        <div class="flex items-start gap-3 p-3 rounded-xl bg-black/[0.03] dark:bg-white/[0.04]">
            <div class="w-2 h-2 rounded-full bg-[#d4732f] mt-1.5 shrink-0"></div>
            <span class="text-[14px] opacity-70">{{msg}}</span>
        </div>
        }
    </div>
    }

</div>
