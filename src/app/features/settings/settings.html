<div class="flex flex-col gap-6 px-1">

    <!-- Accent Color -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4 landscape:p-2 landscape:px-[11px]">
        <div class="flex flex-col leading-snug">
            <span class="text-[17px] font-bold tracking-tight">Accent Color</span>
            <span class="text-[13px] opacity-40 mt-0.5">Personalize your highlights</span>
        </div>

        <div class="flex items-center gap-3 md:gap-2.5 w-full md:w-[320px] flex-wrap py-2">
            @for (color of accentColors; track color) {
            <button (click)="setAccent(color)"
                class="relative size-[40px] md:size-[36px] shrink-0 rounded-full transition-all duration-200 hover:scale-110 active:scale-90 flex items-center justify-center"
                [style.backgroundColor]="color"
                [class.ring-2]="currentAccent() === color"
                [class.ring-offset-2]="currentAccent() === color"
                [class.ring-offset-white]="currentAccent() === color"
                [class.dark:ring-offset-[#2c2c2e]]="currentAccent() === color"
                [style.--tw-ring-color]="currentAccent() === color ? color : 'transparent'">
                @if (currentAccent() === color) {
                <svg class="size-4 text-white animate-in zoom-in duration-300 drop-shadow" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
                }
            </button>
            }
        </div>
    </div>

    <!-- Разделитель -->
    <div class="h-px bg-black/[0.06] dark:bg-white/[0.06] mx-4"></div>

    <!-- Notifications -->
    @if (messages.length > 0) {
    <div class="flex flex-col gap-2 p-4">
        <span class="text-[17px] font-bold tracking-tight">Notifications</span>
        @for(msg of messages; track msg) {
        <div class="flex items-start gap-3 p-3 rounded-[var(--radius-sm)] bg-black/[0.03] dark:bg-white/[0.04]">
            <div class="w-2 h-2 rounded-full bg-[var(--color-accent)] mt-1.5 shrink-0"></div>
            <span class="text-[14px] opacity-70">{{msg}}</span>
        </div>
        }
    </div>
    }
</div>
