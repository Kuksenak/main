<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4 landscape:p-2 landscape:px-[11px]">
    <div class="flex flex-col leading-snug">
        <span class="text-[17px] font-bold tracking-tight">Theme Mode</span>
        <span class="text-[14px] opacity-50">Switch between light and dark aesthetics</span>
    </div>

    <div
        class="flex bg-black/5 dark:bg-white/5 p-1 rounded-2xl border border-black/5 dark:border-white/5 shrink-0 w-full md:w-[350px] h-12">
        @for (t of themes; track t) {
        <button (click)="changeTheme(t)"
            class="relative flex-1 h-full text-[15px] font-bold transition-all duration-300 outline-none rounded-xl"
            [class.text-app-accent]="currentTheme() === t" [class.opacity-40]="currentTheme() !== t">
            <span class="relative z-10">{{ t | titlecase }}</span>
            @if (currentTheme() === t) {
            <div
                class="absolute inset-0 bg-white dark:bg-[#33373a] shadow-sm rounded-xl animate-in fade-in zoom-in-95 duration-200">
            </div>
            }
        </button>
        }
    </div>
</div>

<div
    class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-4 landscape:p-2 landscape:px-[11px] border-t border-black/5 dark:border-white/5 mt-4 pt-6 landscape:pt-3">
    <div class="flex flex-col leading-snug">
        <span class="text-[17px] font-bold tracking-tight">Accent Color</span>
        <span class="text-[14px] opacity-50">Personalize your interaction highlights</span>
    </div>

    <div class="flex items-center justify-between w-full md:w-[350px] px-1 py-4 flex-wrap gap-2">
        @for (color of accentColors; track color) {
        <button (click)="setAccent(color)"
            class="relative size-[44px] md:size-[40px] shrink-0 rounded-full transition-all hover:scale-110 active:scale-90 flex items-center justify-center shadow-lg shadow-black/10"
            [style.backgroundColor]="color">
            @if (currentAccent() === color) {
            <svg class="size-5 text-white animate-in zoom-in duration-300" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            }
        </button>
        }
    </div>
</div>

<div class="p-8 text-center opacity-30 text-[13px] mt-12 mb-20">
    <div class="font-bold mb-1">Ascetic App</div>
    <div>Build: {{version}}</div>
</div>
