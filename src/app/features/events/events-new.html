<section class="flex flex-col gap-6 px-1">
  <form class="flex flex-col gap-4 px-4 pb-8">
    <!-- Title -->
    <div class="flex flex-col gap-2">
      <label class="text-[16px] font-semibold">Title</label>
      <input
        type="text"
        [value]="title()"
        (input)="title.set($any($event.target).value)"
        placeholder="Event title"
        class="w-full px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
      />
    </div>

    <!-- Calendar Selection -->
    <div class="flex flex-col gap-2">
      <label class="text-[16px] font-semibold">Calendar</label>
      <select
        [value]="selectedCalendarId()"
        (change)="selectedCalendarId.set($any($event.target).value)"
        class="w-full px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
      >
        <option value="">Select a calendar</option>
      </select>
    </div>

    <!-- All Day Toggle -->
    <div class="flex items-center justify-between">
      <label class="text-[16px] font-semibold">All Day</label>
      <button
        type="button"
        role="switch"
        [attr.aria-checked]="isAllDay()"
        (click)="toggleAllDay()"
        class="relative inline-flex h-6 w-14 items-center rounded-full border border-black/10 dark:border-white/20 overflow-hidden transition-all ease-[cubic-bezier(0.22,1,0.36,1)]"
        [style.transitionDuration]="'1000ms'"
        [style.background]="isAllDay() ? '#34C759' : 'rgba(127,127,127,0.35)'"
      >
        <span
          class="absolute top-1/2 rounded-full transition-all ease-[cubic-bezier(0.22,1,0.36,1)] -translate-y-1/2"
          [style.transitionDuration]="'1000ms'"
          [style.animation]="isAllDaySwitching() ? 'ios-switch-thumb-pop 1000ms cubic-bezier(0.22,1,0.36,1)' : 'none'"
          [style.left]="isAllDay() ? 'auto' : '2px'"
          [style.right]="isAllDay() ? '2px' : 'auto'"
          [style.width]="isAllDay() ? '30px' : '26px'"
          [style.height]="isAllDay() ? '20px' : '18px'"
          [style.scale]="1"
          [style.background]="isAllDaySwitching() ? 'rgba(255,255,255,0.78)' : 'rgba(255,255,255,0.96)'"
          [style.backdropFilter]="isAllDaySwitching() ? 'blur(8px) saturate(1.35)' : 'none'"
          [style.border]="isAllDaySwitching() ? '1px solid rgba(255,255,255,0.65)' : '1px solid rgba(255,255,255,0.9)'"
          [style.boxShadow]="isAllDaySwitching() ? '0 4px 14px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.65)' : '0 2px 8px rgba(0,0,0,0.2), inset 0 0.5px 0 rgba(255,255,255,0.55)'"
        ></span>
      </button>
    </div>

    <!-- Start Date/Time -->
    <div class="flex flex-col gap-2">
      <label class="text-[16px] font-semibold">Starts</label>
      <div class="flex gap-2">
        <input
          type="date"
          [value]="startDate()"
          (change)="startDate.set($any($event.target).value)"
          class="flex-1 px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
        />
        @if (!isAllDay()) {
          <input
            type="time"
            [value]="startTime()"
            (change)="startTime.set($any($event.target).value)"
            class="flex-1 px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
          />
        }
      </div>
    </div>

    <!-- End Date/Time -->
    <div class="flex flex-col gap-2">
      <label class="text-[16px] font-semibold">Ends</label>
      <div class="flex gap-2">
        <input
          type="date"
          [value]="endDate()"
          (change)="endDate.set($any($event.target).value)"
          class="flex-1 px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
        />
        @if (!isAllDay()) {
          <input
            type="time"
            [value]="endTime()"
            (change)="endTime.set($any($event.target).value)"
            class="flex-1 px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
          />
        }
      </div>
    </div>

    <!-- Location -->
    <div class="flex flex-col gap-2">
      <label class="text-[16px] font-semibold">Location</label>
      <input
        type="text"
        [value]="location()"
        (input)="location.set($any($event.target).value)"
        placeholder="Event location"
        class="w-full px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
      />
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-2">
      <label class="text-[16px] font-semibold">Description</label>
      <textarea
        [value]="description()"
        (input)="description.set($any($event.target).value)"
        placeholder="Event description"
        rows="4"
        class="w-full px-3 py-2 rounded-lg border border-black/8 dark:border-white/10 bg-white/50 dark:bg-white/[0.03] text-[17px] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)] resize-none"
      ></textarea>
    </div>
  </form>
</section>

<ng-template #sheetHeaderActions>
  <button
    type="button"
    (click)="save()"
    [disabled]="isSaving()"
    class="w-11 h-11 flex items-center justify-center rounded-full bg-white/45 dark:bg-white/[0.12] backdrop-blur-lg border border-white/65 dark:border-white/25 shadow-[0_6px_24px_rgba(0,0,0,0.08),inset_0_0.5px_0_rgba(255,255,255,0.3)] hover:bg-white/50 dark:hover:bg-white/[0.14] active:scale-125 active:bg-white/70 dark:active:bg-white/[0.22] active:shadow-[0_12px_30px_rgba(0,0,0,0.12),inset_0_1px_0_rgba(255,255,255,0.55)] transition-all duration-150 ease-out disabled:opacity-60 disabled:cursor-not-allowed"
    aria-label="Save event"
  >
    <svg class="w-[24px] h-[24px]" fill="none" [style.stroke]="accentColor()" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
    </svg>
  </button>
</ng-template>
