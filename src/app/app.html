<div id="app-main-wrapper" class="flex flex-col h-dvh w-full overflow-hidden">
    <app-navbar></app-navbar>

    @if (updateAvailable()) {
    <button (click)="reloadApp()"
        class="mx-4 mt-2 px-4 py-2 bg-[var(--color-accent)] text-white rounded-full text-sm font-medium flex items-center justify-center gap-2 active:scale-95 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
            <path d="M16 21h5v-5" />
        </svg>
        Доступно обновление
    </button>
    }

    <main #scrollContainer class="flex-1 overflow-y-auto overflow-x-hidden relative flex flex-col bg-background">
        <div class="flex-1 flex flex-col px-5 pt-6 max-w-6xl mx-auto w-full">

            <div class="flex-1 flex flex-col">
                @if (authStore.isAuthenticated()) {
                <router-outlet />
                }
            </div>

            <footer
                class="py-6 text-center text-xs font-bold uppercase opacity-30 pb-[calc(env(safe-area-inset-bottom)+20px)]">
                © 2026 {{version}}. TEIRA.
            </footer>
        </div>
    </main>

    <!-- <app-player-bar></app-player-bar> -->
</div>
