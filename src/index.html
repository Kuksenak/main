<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Main</title>
  <base href="/">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preload" href="assets/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f3f3f3" id="theme-color-meta" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">

  <script>
    (function() {
      var theme = localStorage.getItem('app-theme') || 'system';
      var isDark = theme === 'dark' ||
        (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

      if (isDark) {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-color-meta').content = '#33373a';
      }
    })();
  </script>
</head>

<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
